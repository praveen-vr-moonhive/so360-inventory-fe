name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Checkout Shell FE packages
      uses: actions/checkout@v4
      with:
        repository: praveen-vr-moonhive/so360-shell-fe
        token: ${{ secrets.PAT_TOKEN }}
        path: _shell-fe

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build Shell packages
      working-directory: _shell-fe
      run: |
        for pkg in packages/shell-context packages/design-system packages/event-bus packages/formatters; do
          if [ -d "$pkg" ]; then
            (cd "$pkg" && npm install --legacy-peer-deps && npm run build)
          fi
        done

    - name: Install dependencies
      run: rm -f package-lock.json && npm install --legacy-peer-deps

    - name: Link Shell packages to node_modules
      run: |
        mkdir -p node_modules/@so360
        for pkg in shell-context design-system event-bus formatters; do
          if [ -d "_shell-fe/packages/$pkg" ]; then
            rm -rf "node_modules/@so360/$pkg"
            cp -r "_shell-fe/packages/$pkg" "node_modules/@so360/$pkg"
          fi
        done

    - name: Build
      run: npm run build
